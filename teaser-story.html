<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<title>Venus Awakening — Story Teaser</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet" />
<link href="https://fonts.cdnfonts.com/css/glacial-indifference" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #eee;
    min-height: 100vh;
  }

  .story {
    position: relative;
    width: 1080px;
    height: 1920px;
    background: #fdf6ee;
    overflow: hidden;
    font-family: 'Glacial Indifference', sans-serif;
  }

  .story-bg {
    position: absolute;
    inset: 0;
    background-image: url('statue-amor-psyche.jpg');
    background-size: cover;
    background-position: center 30%;
    opacity: 0.16;
  }

  .glow-top {
    position: absolute;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 900px; height: 900px;
    background: radial-gradient(circle, rgba(226,149,79,0.35) 0%, rgba(226,149,79,0) 70%);
  }

  .glow-bottom {
    position: absolute;
    bottom: -250px; left: 50%;
    transform: translateX(-50%);
    width: 1000px; height: 1000px;
    background: radial-gradient(circle, rgba(193,84,58,0.28) 0%, rgba(193,84,58,0) 70%);
  }

  .content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 90px;
  }

  .dots {
    display: flex;
    gap: 14px;
    margin-bottom: 36px;
  }
  .dots span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #c1543a;
  }

  .eyebrow {
    font-weight: 700;
    font-size: 24px;
    letter-spacing: 0.35em;
    color: #cd8f2c;
    text-transform: uppercase;
    margin-bottom: 50px;
  }

  .hook {
    font-weight: 700;
    font-size: 60px;
    line-height: 1.45;
    color: #1c1c14;
    max-width: 820px;
    margin-bottom: 80px;
  }

  .title {
    font-family: 'Pinyon Script', cursive;
    font-size: 200px;
    line-height: 1.05;
    color: #c1543a;
    margin-bottom: 40px;
  }

  .divider {
    width: 160px;
    height: 1px;
    background: #cd8f2c;
    margin-bottom: 50px;
  }

  .sub {
    font-weight: 400;
    font-size: 38px;
    line-height: 1.5;
    color: #1c1c14;
    margin-bottom: 80px;
  }

  .slogan {
    font-family: 'Pinyon Script', cursive;
    font-size: 64px;
    line-height: 1.4;
    color: #bc7404;
    margin-bottom: 110px;
  }

  .pill {
    background: #1c1c14;
    color: #fdf6ee;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: 0.3em;
    padding: 26px 64px;
    border-radius: 999px;
    margin-bottom: 50px;
  }

  .footer {
    font-weight: 400;
    font-size: 26px;
    letter-spacing: 0.15em;
    color: #7a6a5c;
  }
</style>
</head>
<body>
  <div class="story">
    <div class="story-bg"></div>
    <div class="glow-top"></div>
    <div class="glow-bottom"></div>
    <div class="content">
      <div class="dots"><span></span><span></span><span></span></div>
      <p class="eyebrow">Aktueller Transit</p>
      <h1 class="hook">Venus ist gerade in den Löwen gewandert.</h1>
      <div class="divider"></div>
      <p class="sub">Mehr Wärme.<br />Mehr Glanz.<br />Mehr Herz.</p>
      <p class="slogan">Lass dich sehen.<br />Lass dich lieben.</p>
      <p class="footer">mehr zu deiner Venus folgt bald 🌹</p>
    </div>
  </div>
</body>
</html>
